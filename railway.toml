[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Ship API scheduler service (runs at 13:00 KST on weekdays)
[[services]]
name = "ship-scheduler"

[services.schedule]
# UTC 04:00 = KST 13:00, weekdays only
cron = "0 4 * * 1-5"
command = "python -m Ship_API.main schedule-shopby"

[services.variables]
TZ = "Asia/Seoul"
PYTHONPATH = "."

[[services]]
name = "ship-cornerlogis"

[services.schedule]
# UTC 04:30 = KST 13:30, weekdays only
cron = "30 4 * * 1-5"
command = "python -m Ship_API.main schedule-cornerlogis"

[services.variables]
TZ = "Asia/Seoul"
PYTHONPATH = "."

# One-off test runner service: runs immediately on deploy and exits
[[services]]
name = "ship-once-test"
startCommand = "python -m Ship_API.main run-shopby && python -m Ship_API.main run-cornerlogis"

[services.variables]
TZ = "Asia/Seoul"
PYTHONPATH = "."